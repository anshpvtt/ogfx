services:
  - type: web
    name: ogfx-render-agent
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npx prisma generate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OLLAMA_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemma-4-31b-it:free
      - key: OLLAMA_MODEL
        value: gemma4:31b
      - key: OLLAMA_VISION_MODEL
        value: qwen3-vl:235b-instruct
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: AGENT_SECRET
        generateValue: true
      - key: CRON_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://ogfx-frontend.vercel.app
      - key: BINANCE_API_URL
        value: https://api.binance.com
      - key: TWELVEDATA_API_KEY
        sync: false
      - key: LIVE_AGENT_ENABLED
        value: true
      - key: LIVE_AGENT_INTERVAL_SECONDS
        value: 60
      - key: LIVE_AGENT_SIGNAL_GAP_MINUTES
        value: 15
      - key: LIVE_AGENT_ASSETS
        value: XAUUSD,EURUSD,GBPUSD,USDJPY,BTCUSD,ETHUSD,USOIL,NAS100,SPX500
      - key: LIVE_AGENT_TIMEFRAMES
        value: 15m,1h
      - key: SIGNAL_INTERVAL_SECONDS
        value: 60
      - key: MAX_DAILY_SIGNALS
        value: 10
      - key: MIN_CONFIDENCE
        value: 68
